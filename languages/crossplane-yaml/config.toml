name = "Crossplane YAML"
grammar = "gotmpl"
# Zed path_suffixes match dot-delimited suffixes or exact filenames. User
# file_types globs are required for names like xexample-composition.yaml.
path_suffixes = ["crossplane.yaml", "crossplane.yml"]
line_comments = ["# "]
block_comment = ["{{/* ", " */}}"]
brackets = [
  { start = "{{", end = "}}", close = true, newline = false },
  { start = "{{-", end = "-}}", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
]
